<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الصفحة الرئيسية</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body" onload="loadHomePage()">

  <div class="app-frame">
    <header class="app-topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="logout()">⎋</button>
      </div>

      <div class="topbar-center">
        <span class="topbar-title">مساحة نمو</span>
      </div>

      <div class="topbar-right">
        <img src="logo.png" class="topbar-logo" alt="شعار مدد" />
      </div>
    </header>

    <div class="dashboard-layout">
      <aside class="dashboard-sidebar">
        <button class="sidebar-menu-btn">☰</button>

        <div class="sidebar-nav">
          <button class="sidebar-item active">مساحة نمو</button>
          <button class="sidebar-item">لوحة التقدم</button>
          <button class="sidebar-item">الألعاب</button>
          <button class="sidebar-item">الإعدادات</button>
        </div>
      </aside>

      <main class="dashboard-main">
        <section class="dashboard-card">
          <div class="dashboard-header-row">
            <button class="icon-btn small-dots">⋮</button>
            <div>
              <h1 class="dashboard-title" id="welcomeMessage">أهلًا ولي أمر الطفل</h1>
              <p class="dashboard-subtitle">
                هنا يمكنك متابعة حالة طفلك والبدء في الاستبيان.
              </p>
            </div>
          </div>

          <div class="info-card">
  <h3>بيانات الطفل</h3>
  <p><strong>اسم الطفل:</strong> <span id="childNameText">---</span></p>
  <p><strong>الحساب:</strong> <span id="emailText">---</span></p>
  <p><strong>آخر مرة أُدي الاختبار:</strong> <span id="lastTestDateText">لم يتم بعد</span></p>
  <p><strong>آخر مستوى:</strong> <span id="lastLevelText">لا يوجد</span></p>
</div>

          <div class="dashboard-actions">
            <button class="primary-btn large-action" onclick="startQuestionnaire()">
              ابدأ الاستبيان الآن
            </button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
