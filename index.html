<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">

  <div class="landing-page">
    <div class="landing-card">
      <div class="landing-logo-wrap">
        <img src="logo.png" class="landing-logo" alt="شعار مدد" />
      </div>

      <h1 class="landing-title">مرحبًا بكم في تطبيق مدد</h1>
      <p class="landing-text">
        هلا والله! مع مدد نساعدك تتابع نمو طفلكم ونكتشف احتياجاته خطوة بخطوة.
      </p>

      <h2 class="landing-subtitle">من المستخدم؟</h2>

      <div class="landing-roles">
        <button class="landing-role-btn parent-btn" onclick="goParent()">
          <div class="landing-role-content">
            <h3>ولي الأمر</h3>
            <p>الدخول لإدارة الحساب والاستبيان</p>
          </div>
        </button>

        <button class="landing-role-btn child-btn" onclick="goChild()">
          <div class="landing-role-content">
            <h3>الطفل</h3>
            <p>الدخول إلى صفحة الألعاب</p>
          </div>
        </button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
