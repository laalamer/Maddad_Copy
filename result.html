<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | النتيجة</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body" onload="loadResultPage()">

  <div class="app-frame">
    <header class="app-topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="goBackHome()">←</button>
      </div>

      <div class="topbar-center">
        <span class="topbar-title">نتيجة التقييم</span>
      </div>

      <div class="topbar-right">
        <img src="logo.png" class="topbar-logo" alt="شعار مدد" />
      </div>
    </header>

    <div class="dashboard-layout">
      <aside class="dashboard-sidebar">
        <button class="sidebar-menu-btn">☰</button>

        <div class="sidebar-nav">
          <button class="sidebar-item active">النتيجة</button>
          <button class="sidebar-item" onclick="goBackHome()">مساحة نمو</button>
          <button class="sidebar-item">لوحة التقدم</button>
          <button class="sidebar-item">الألعاب</button>
        </div>
      </aside>

      <main class="dashboard-main">
        <section class="dashboard-card result-panel">
          <div id="resultBadge" class="result-pill">نتيجة التقييم</div>
          <h1 id="resultTitle" class="result-big-title">---</h1>
          <p id="resultText" class="result-paragraph">---</p>
          <div id="resultSummary" class="result-summary-box"></div>

          <button id="resultMainBtn" class="primary-btn large-action" onclick="handleResultMainAction()">
            متابعة
          </button>
        </section>
      </main>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
