<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | تسجيل ولي الأمر</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-main">
  <div class="bg-blur bg-blur-top"></div>
  <div class="bg-blur bg-blur-bottom"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <img src="logo.png" class="logo small-logo" alt="شعار مدد" />
        <h1 class="auth-title">ولي الأمر</h1>
        <p class="auth-subtitle">سجّل الدخول أو أنشئ حسابًا جديدًا</p>
      </div>

      <!-- Login Form -->
      <div id="loginBox">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="parentLoginEmail" placeholder="example@email.com" />
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="parentLoginPassword" placeholder="********" />
        </div>

        <button class="main-btn" onclick="parentLogin()">تسجيل الدخول</button>

        <p class="switch-text">
          ما عندك حساب؟
          <span class="switch-link" onclick="showSignup()">إنشاء حساب</span>
        </p>
      </div>

      <!-- Signup Form -->
      <div id="signupBox" style="display:none;">
        <div class="form-group">
          <label>اسم الطفل</label>
          <input type="text" id="signupChildName" placeholder="مثال: لمى" />
        </div>

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="signupEmail" placeholder="example@email.com" />
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="signupPassword" placeholder="********" />
        </div>

        <button class="main-btn" onclick="parentSignup()">إنشاء الحساب</button>

        <p class="switch-text">
          عندك حساب؟
          <span class="switch-link" onclick="showLogin()">تسجيل الدخول</span>
        </p>
      </div>

      <div class="back-link-wrap">
        <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
