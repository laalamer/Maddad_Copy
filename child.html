<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | دخول الطفل</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">

  <div class="app-frame auth-frame">
    <header class="app-topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="window.location.href='index.html'">←</button>
      </div>

      <div class="topbar-center">
        <span class="topbar-title">دخول الطفل</span>
      </div>

      <div class="topbar-right">
        <img src="logo.png" class="topbar-logo" alt="شعار مدد" />
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-panel">
        <h1 class="panel-title">مرحبًا! سجّل دخول الطفل</h1>
        <p class="panel-text">
          بعد الدخول سيتم الانتقال إلى صفحة الألعاب.
        </p>

        <div class="field-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="childLoginEmail" placeholder="example@email.com" />
        </div>

        <div class="field-group">
          <label>كلمة المرور</label>
          <input type="password" id="childLoginPassword" placeholder="********" />
        </div>

        <button class="primary-btn" onclick="childLogin()">دخول الطفل</button>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
