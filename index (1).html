<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | MADDAD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-main">
  <div class="bg-blur bg-blur-top"></div>
  <div class="bg-blur bg-blur-bottom"></div>

  <div class="container">
    <div class="welcome-section">
      <img src="logo.png" class="logo" alt="شعار مدد" />

      <h1 class="welcome-title">مرحباً بكم في تطبيق مدد</h1>

      <p class="welcome-text">
        هلا والله! مع مدد نساعدك تتابع نمو طفلكم
        ونكتشف احتياجاته خطوة بخطوة.
      </p>
    </div>

    <div class="user-section">
      <h2 class="user-heading">من المستخدم؟</h2>

      <div class="role-grid">
        <div class="role-card parent" onclick="goParent()">
          <div class="role-text">
            <h3>ولي الأمر</h3>
            <p>الدخول لإدارة الحساب والاستبيان</p>
          </div>
          <div class="icon">👨‍👩‍👧</div>
        </div>

        <div class="role-card child" onclick="goChild()">
          <div class="role-text">
            <h3>الطفل</h3>
            <p>الدخول إلى صفحة الألعاب</p>
          </div>
          <div class="icon">🧒</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
